<!DOCTYPE html>
<html>
    <head>
        <title>✅ToDone</title>
    </head>
    <body>
        <input type="button" value="<<" onclick="moveDays(-7)"/>
        <input type="button" value="<" onclick="moveDays(-1)"/>
        <input id="todo_date" type="date" onchange="setLoading('todo_viewer', getTodoForDate(this.value).then(showTodos))"/>
        <input type="button" value=">" onclick="moveDays(1)"/>
        <input type="button" value=">>" onclick="moveDays(7)"/>
        <div id="todo_viewer"></div>
        <input id="todo_input" type="text" />
        <input id="todo_submit" type="button" value="Create!" onclick="submitTodo()"/>
        
        <script>
            const todoDate = document.getElementById("todo_date");
            const todoViewer = document.getElementById("todo_viewer");
            const todoInput = document.getElementById("todo_input");
            const todoSubmit = document.getElementById("todo_submit");

            todoInput.addEventListener('keyup', ({key}) => {
                if (key == "Enter") {
                    todoSubmit.dispatchEvent(new MouseEvent('click'));
                }
            });

            async function getTodoForDate(date) {
                const params = new URLSearchParams(location.search);
                params.set("date", date);
                history.replaceState(null, "", "?" + params.toString())
                let req = new Request(`./todos?date=${encodeURIComponent(date)}`);
                let todos = await fetch(req).then(res => res.json());
                return todos;
            }

            function moveDays(deltaDays) {
                let currDate = new Date(dateInput.valueAsDate);
                currDate.setDate(currDate.getDate() + deltaDays);
                dateInput.valueAsDate = new Date(currDate);
                const event = new Event('change', { bubbles: true });
                dateInput.dispatchEvent(event);
            }

            async function showTodos(todos) {
                todoViewer.innerHTML = `<h1>${todos.date}</h1>`;
                for (let todo of todos.todos) {
                    todoViewer.appendChild(todoElement(todo.text, todo.status, todo.uuid));
                }
            }

            function todoElement(text, status, uuid) {
                let elem = document.createElement("p");
                elem.dataset.uuid = uuid;

                let statusDisplay = statusSpan(elem, status)
                elem.appendChild(statusDisplay);

                let textSpan = document.createElement("span");
                textSpan.innerText = text;
                elem.appendChild(textSpan);

                let delButton = document.createElement("input");
                delButton.type = "button";
                delButton.value = "🗑️";
                delButton.onclick = () => deleteTodo(elem);
                elem.appendChild(delButton);

                return elem;
            }

            function statusSpan(parent, status) {
                let elem = document.createElement("span");
                if (status == 2) elem.innerText = "✅";
                else if (status == 1) elem.innerText = "ℹ️";
                else if (status == 0) elem.innerText = "⭕";
                else elem.innerText = "🤔";

                elem.onclick = () => {
                    let newStatus = (status + 1) % 3;
                    let newElem = statusSpan(parent, newStatus);
                    parent.replaceChild(newElem, elem);
                    updateTodoStatus(parent, newStatus);
                };

                return elem;
            }

            function setLoading(id, asyncLambda) {
                let elem = document.getElementById(id);
                elem.innerHTML = "<p>Loading...</p>";
                asyncLambda();
            }

            async function submitTodo() {
                let text = todoInput.value;
                if (text.trim() == "") return;
                todoInput.value = "";

                let elem = todoElement(text, 0, null);
                todoViewer.appendChild(elem);
                
                let uuid = await fetch(new Request('./todos', {
                    method: "PUT",
                    body: JSON.stringify({
                        date: todoDate.value,
                        text: text,
                        status: 0,
                    }),
                    headers: { 'Content-Type': 'application/json'},
                })).then(res => res.text());
                elem.dataset.uuid = uuid;
            }

            async function updateTodoStatus(elem, status) {
                let uuid = elem.dataset.uuid;
                let req = new Request(`./todos/${uuid}`, {
                    method: 'PATCH',
                    body: status,
                    headers: { 'Content-Type': 'text/plain'},
                });
                await fetch(req);
            }

            async function deleteTodo(elem) {
                let uuid = elem.dataset.uuid;

                todoViewer.removeChild(elem);

                let req = new Request(`./todos/${uuid}`, {
                    method: 'DELETE',
                });
                await fetch(req);
            }
        </script>
        <script>
            let dateInput = document.getElementById("todo_date");
            const params = new URLSearchParams(location.search);
            let selectedDate = params.get("date");
            if (selectedDate == null) {
                dateInput.valueAsDate = new Date();
            } else {
                dateInput.value = selectedDate;
            }
            const event = new Event('change', { bubbles: true });
            dateInput.dispatchEvent(event);
        </script>
    </body>
</html>
